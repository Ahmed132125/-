name: DS2API VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    defaults:
      run:
        shell: bash
        working-directory: /home/runner/work/_temp_project

    steps:
      - name: Prepare workspace
        run: |
          mkdir -p /home/runner/work/_temp_project
          cd /home/runner/work/_temp_project

      - name: Update & install base deps
        run: |
          sudo apt update -y
          sudo apt install -y curl git

      - name: Install Node.js 18
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt install -y nodejs
          node -v
          npm -v

      - name: Install PM2
        run: |
          sudo npm install -g pm2

      - name: Clone DS2API
        run: |
          git clone https://github.com/CJackHwang/ds2api.git
          ls -R

      - name: Install dependencies (auto-detect path)
        run: |
          cd ds2api
          if [ -f package.json ]; then
            npm install
            echo "ROOT project detected"
          elif [ -d backend ]; then
            cd backend
            npm install
            echo "BACKEND detected"
          elif [ -d server ]; then
            cd server
            npm install
            echo "SERVER detected"
          else
            echo "❌ No Node project found"
            exit 1
          fi

      - name: Run DS2API
        run: |
          cd ds2api
          if [ -f package.json ]; then
            pm2 start index.js --name ds2api || pm2 start server.js --name ds2api
          elif [ -d backend ]; then
            cd backend
            pm2 start index.js --name ds2api || pm2 start server.js --name ds2api
          elif [ -d server ]; then
            cd server
            pm2 start index.js --name ds2api || pm2 start server.js --name ds2api
          fi
          pm2 save
          pm2 list

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Show Tailscale IP
        run: |
          echo "🌐 Your VPS IP:"
          tailscale ip -4

      - name: Keep Alive
        run: |
          while true; do
            echo "🔥 DS2API running..."
            sleep 300
          done
