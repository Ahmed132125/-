- name: Clone repo
  run: git clone https://github.com/CJackHwang/ds2api.git

- name: Install deps and run
  working-directory: ./ds2api
  run: |
    if [ -f package.json ]; then
      npm install
      pm2 start index.js --name ds2api || pm2 start server.js --name ds2api
    elif [ -d backend ]; then
      cd backend
      npm install
      pm2 start index.js --name ds2api || pm2 start server.js --name ds2api
    fi
